<html>

<head>

    <meta name="format-detection" content="telephone=no" />
    <meta name="referrer" content="no-referrer" />
    <title>Published Application by AppMagic</title>

    <script type="text/javascript">window["PowerAppsTitle"] = "IAS Quick Guides 📖";</script>

    <!-- PLACEHOLDER: PlatformOverrides -->

    <!-- PLACEHOLDER: Language Specific Resources -->

    <!-- PLACEHOLDER: Telemetry -->

    <link href="publish/css/pa.styles.bundle.css" rel="stylesheet">
<script src="js/winjs/base.js"></script>
<script src="publish/js/pa.oss.bundle1.js"></script>
<script src="publish/js/pa.oss.bundle2.js"></script>
<script src="publish/js/pa.core.bundle3.js"></script>
<script src="publish/js/pa.core.bundle2.js"></script>
<script src="js/Core.Services.js"></script>
<script src="publish/js/pa.core.bundle1.js"></script>
<script src="publish/js/pa.common.bundle1.js"></script>
<script src="js/AppMagic.PublishedApp.Player.js"></script>

    <!-- PLACEHOLDER: Embedded CSS -->

    

</head>

<body>
    <div id="screenLoadingPlaceholder" class="screen-loading-placeholder">
        <style>
            .spinnerOverlay {
                position: absolute !important;
                top: 0px !important;
                bottom: 0px !important;
                left: 0px !important;
                right: 0px !important;
                background-color: white;
                z-index: 99999 !important;
                margin-top: -48px;
            }

            .spinnerCircle {
                position: absolute !important;
                top: 50% !important;
                left: 50% !important;
                margin-top: -42px !important;
                margin-left: -42px !important;
                box-sizing: border-box !important;
                width: 84px !important;
                height: 84px !important;
                animation-name: spinnerkeyframes !important;
                animation-duration: 1.3s !important;
                animation-iteration-count: infinite !important;
                border-radius: 50% !important;
                border-width: 8px !important;
                border-style: solid !important;
                transition: cubic-bezier(0.53, 0.21, 0.29, 0.67) !important;
                border-color: rgb(62, 96, 170) rgba(62, 69, 170, 0.3) rgba(62, 96, 170, 0.3);
            }

            @keyframes spinnerkeyframes {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
        </style>
        <div class="spinnerOverlay">
            <div class="spinnerCircle"></div>
        </div>
    </div>
    <div id="publishedCanvasContainer">
        <style>
            #responsiveScalingCanvasHost {
                position: absolute;
                overflow: visible;
                width: 100vw;
                height: 100vh;
            }
        </style>
        <div id="responsiveScalingCanvasHost">
            <div id="publishedCanvas"> </div>
        </div>
    </div>
    <div id="full-screen-host" class="full-screen-host"></div>
    <div class="notification-host" data-bind="component: 'notification-host'"></div>
    <div id="monitor-indicator" class="monitor-indicator">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="10" r="9" strokewidth="2" style="fill:white"></circle>
            <circle cx="10" cy="10" r="6" style="fill:red"></circle>
        </svg>
    </div>

    <script type="text/javascript">

        function getUriOrigin(uri) {
            if (!uri) {
                return null;
            }

            var uriParser = document.createElement('a');
            uriParser.href = uri; // CodeQL [SM01507] This is a helper method, validation happens in the calling method

            return uriParser.protocol + "//" + uriParser.host;
        }

        function isAllowlistedOrigin(uri) {
            if (!uri) {
                return false;
            }

            if (getUriOrigin(uri).toLowerCase() === "https://powerapps.cloudapp.net") {
                // Running from the local portal
                return true;
            }

            var uriParser = document.createElement('a');
            uriParser.href = uri; // CodeQL [SM01507] Validation happens below

            var hostname = uriParser.hostname;

            if (!hostname) {
                return false;
            }

            var parts = hostname.split('.');

            if (parts.length < 2) {
                return false;
            }

            var hostnameWithoutSubDomains = parts.slice(parts.length - 2).join(".");

            if (hostnameWithoutSubDomains.toLowerCase() === "powerapps.com") {
                return true;
            }

            return false;
        }

        var regexMatches = window.location.search.match(/[?&]loader=([^&#]*)/i);
        if (regexMatches && regexMatches.length >= 1 && regexMatches[1] !== "") {

            var loaderUri = decodeURIComponent(regexMatches[1]);

            if (loaderUri && loaderUri !== "inline") {
                if (
                    window.location.href.toLowerCase().indexOf("ms-local-stream://microsoft.msapps_") === 0 || // This is running from our windows app
                    getUriOrigin(loaderUri).toLowerCase() === getUriOrigin(window.location.href).toLowerCase() ||
                    isAllowlistedOrigin(loaderUri)
                ) {
                        loaderTag = document.createElement("SCRIPT");
                        loaderTag.src = loaderUri;
                        document.head.appendChild(loaderTag);
                } else {
                    // the url is invalid
                    // We send an error to the host. We have to do this like this as cordova has yet to be loaded
                    var hashParams = window.location.hash.substring(1);
                    var decodedParams = decodeURIComponent(hashParams);
                    if (decodedParams) {
                        var playerArguments = JSON.parse(decodedParams);

                        if (typeof(playerArguments.antiCSRFToken) !== "undefined") {
                            var message = {
                                isPluginCall: true,
                                callbackId: "invalidLoaderUrl",
                                service: "AppLifecycle",
                                action: "notifyAppFailed",
                                actionArgs: ["Invalid Loader url", loaderUri],
                                antiCSRFToken: playerArguments.antiCSRFToken
                            };
                            window.parent.postMessage(message, "*");
                        }
                    }
                }
            }
        } else {
            AppMagic.start();
        }
    </script>
</body>

</html>
